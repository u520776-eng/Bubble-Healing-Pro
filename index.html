<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泡泡癒 Bubble Healing Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020617; font-family: sans-serif; touch-action: none; user-select: none; color: white; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 0; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        @keyframes lightning-flash {
            0% { background: rgba(255, 255, 255, 0); }
            10% { background: rgba(255, 255, 255, 1); }
            20% { background: rgba(56, 189, 248, 0.6); }
            100% { background: rgba(255, 255, 255, 0); }
        }
        .lightning-active { animation: lightning-flash 0.6s ease-out forwards; }
        .hazard-line {
            position: absolute; top: 50%; left: 0; width: 100%; height: 3px;
            background: #ff0000; box-shadow: 0 0 20px #ff0000;
            opacity: 0.9; z-index: 5; pointer-events: none;
            border-bottom: 1px dashed rgba(255,255,255,0.7);
        }
        .hazard-label {
            position: absolute; top: 50%; right: 10px; transform: translateY(-120%);
            color: #ff0000; font-size: 11px; font-weight: 900; letter-spacing: 2px;
            text-shadow: 0 0 8px #000; z-index: 6; pointer-events: none;
        }
        /* 確保按鈕可點擊 */
        .clickable { pointer-events: auto !important; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lightning-overlay" class="absolute inset-0 z-50 pointer-events-none"></div>
    <div class="hazard-line"></div>
    <div class="hazard-label">⚠️ OVERLOAD WARNING</div>
    
    <!-- UI HUD -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none z-10 flex flex-col justify-between p-4">
        <div class="flex justify-between items-start">
            <div class="flex flex-col gap-2">
                <div class="glass rounded-2xl p-3 min-w-[140px] shadow-2xl">
                    <p class="text-[10px] opacity-50 uppercase font-bold tracking-widest text-white">Total Score</p>
                    <p id="hud-score" class="text-3xl font-black font-mono text-yellow-400 tracking-tighter">000000</p>
                </div>
                <div class="flex gap-2">
                    <div class="glass rounded-xl p-2 text-center flex-1">
                        <p class="text-[9px] opacity-50 font-bold uppercase text-white">Pops</p>
                        <p class="text-lg font-black font-mono text-sky-400"><span id="hud-pops">0</span>/100</p>
                    </div>
                    <div class="glass rounded-xl p-2 text-center w-16">
                        <p class="text-[9px] opacity-50 font-bold uppercase text-white">Lv</p>
                        <p id="hud-level" class="text-lg font-black font-mono text-white">1</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col items-end gap-3">
                <div class="glass rounded-xl p-3 w-40 shadow-xl">
                    <p class="text-[9px] opacity-60 text-right mb-1 font-black text-sky-300">⚡ CORE ENERGY</p>
                    <div id="energy-slots" class="flex gap-1 justify-end">
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-800 transition-all"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-800 transition-all"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-800 transition-all"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-800 transition-all"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-800 transition-all"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-800 transition-all"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-800 transition-all"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-800 transition-all"></div>
                    </div>
                </div>
                <button id="btn-pause" class="clickable w-12 h-12 rounded-full glass flex items-center justify-center hover:bg-white/10 transition-all shadow-lg">
                    <svg width="24" height="24" fill="white" viewBox="0 0 256 256"><path d="M200,48V208a8,8,0,0,1-16,0V48a8,8,0,0,1,16,0Zm-128,0V208a8,8,0,0,1-16,0V48a8,8,0,0,1,16,0Z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Modals Container -->
    <div id="modal-container" class="absolute inset-0 flex items-center justify-center bg-slate-950/90 backdrop-blur-2xl z-40 px-6">
        
        <!-- 首頁 -->
        <div id="start-panel" class="text-center w-full max-w-xs block">
            <h1 class="text-6xl font-black mb-2 italic tracking-tighter drop-shadow-2xl">泡泡<span class="text-sky-500">癒</span></h1>
            <p class="text-sky-400 mb-10 text-[11px] uppercase tracking-[0.5em] font-bold opacity-80 text-white">Bubble Healing Pro</p>
            <div class="bg-white/5 border border-white/10 rounded-[40px] p-8 mb-12 shadow-inner">
                <p class="text-[11px] text-white/40 uppercase mb-2 font-bold tracking-widest">個人最佳紀錄</p>
                <p id="best-score-display" class="text-5xl font-black font-mono text-white tracking-tighter">000000</p>
            </div>
            <button id="btn-start" class="clickable w-full bg-sky-500 py-5 rounded-full font-black text-2xl shadow-[0_10px_30px_rgba(14,165,233,0.3)] hover:bg-sky-400 active:scale-95 transition-all text-white">啟動舒壓模式</button>
        </div>

        <!-- 暫停 / 晉升面板 -->
        <div id="pause-panel" class="hidden text-center w-full max-w-xs glass rounded-[48px] p-10 shadow-2xl">
            <h2 id="pause-title" class="text-4xl font-black mb-6 italic text-white">遊戲暫停</h2>
            <div class="bg-black/40 rounded-3xl p-6 mb-10 border border-white/5">
                <p class="text-[10px] text-white/30 uppercase mb-1 tracking-widest">目前積分</p>
                <p id="pause-score" class="text-4xl font-black font-mono text-white">0</p>
            </div>
            <div class="flex flex-col gap-3">
                <button id="btn-resume" class="clickable w-full bg-sky-500 py-4.5 rounded-3xl font-bold text-xl hover:bg-sky-400 shadow-lg text-white">繼續挑戰</button>
                <button id="btn-save-quit" class="clickable w-full bg-white/5 text-white/50 py-4 rounded-3xl font-bold hover:bg-white/10 transition-all">存檔並退出</button>
            </div>
        </div>

        <!-- 遊戲結束面板 -->
        <div id="game-over-panel" class="hidden text-center w-full max-w-sm">
            <div class="mb-6 inline-block p-5 rounded-full bg-red-500/10 border border-red-500/20">
                <svg width="40" height="40" fill="#ef4444" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm-32-96a12,12,0,1,1,12,12A12,12,0,0,1,96,120Zm64,0a12,12,0,1,1,12,12A12,12,0,0,1,160,120Zm-32,56a48.05,48.05,0,0,1-33.94-14.06,8,8,0,0,1,11.32-11.32,32,32,0,0,0,45.24,0,8,8,0,0,1,11.32,11.32A48.05,48.05,0,0,1,128,176Z"></path></svg>
            </div>
            <p id="encouragement-text" class="text-2xl font-bold mb-6 px-4 leading-relaxed tracking-tight text-white">「加油！」</p>
            <div class="bg-white/5 border border-white/10 rounded-[48px] p-10 mb-12 shadow-2xl">
                <p class="text-[11px] opacity-40 uppercase mb-2 font-bold tracking-widest text-white">本次舒壓積分</p>
                <p id="final-score" class="text-7xl font-black font-mono text-yellow-400">0</p>
            </div>
            <div class="flex flex-col gap-3">
                <button id="btn-final-save" class="clickable w-full bg-sky-500 py-5 rounded-3xl font-black text-xl hover:bg-sky-400 shadow-lg text-white">存檔並回首頁</button>
                <button id="btn-retry" class="clickable w-full bg-white/5 text-white/40 py-4 rounded-3xl font-bold">再試一次</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase 安全加載機制 ---
        let db = null;
        let auth = null;
        let user = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bubble-healing-prod-v1';

        async function initFirebase() {
            try {
                const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                if (!config || !config.apiKey) throw new Error("No config");
                
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                
                await signInAnonymously(auth);
                onAuthStateChanged(auth, async (u) => {
                    user = u;
                    if (u) {
                        const snap = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'stats', 'highscore'));
                        if (snap.exists()) {
                            bestScore = snap.data().score || 0;
                            updateBestScoreUI();
                        }
                    }
                });
            } catch (e) {
                console.warn("Firebase 連結失敗，啟動本地模式。");
                // 本地模式：從 localStorage 嘗試讀取（GitHub Pages 暫時解決方案）
                bestScore = parseInt(localStorage.getItem('bubble_best_score')) || 0;
                updateBestScoreUI();
            }
        }

        const ENCOURAGEMENTS = [
            "太棒了！休息一下，下次一定更強！", "沒關係，深呼吸，你已經做得很好了。",
            "壓力都隨泡泡破掉了嗎？再來一場吧！", "你的手速越來越快了，真令人佩服！",
            "每一顆泡泡的破碎，都是煩惱的消散。", "生活就像泡泡，破了沒關係，再吹一個就好。",
            "挑戰自我就是最酷的事，你是最棒的。", "剛剛那一波閃電真帥！休息一下吧。",
            "不管分數高低，只要你開心就好。", "你的專注力真驚人，下次挑戰更高關卡吧！",
            "慢慢來，比較快。這是一場屬於你的旅程。", "聽聽泡泡破裂的聲音，心靈也跟著療癒了。",
            "失敗只是暫時的，你的勇氣是永遠的。", "今天的你比昨天更棒了。",
            "累了嗎？喝杯水，等下再回來爆破壓力！", "享受過程比結果更重要，你做到了。",
            "哇！這個分數代表你非常投入呢。", "別讓壓力堆積，讓它們在指尖消失吧。",
            "每一關都是新的開始，加油！", "保持心情愉快，你是自己生命中的冠軍。"
        ];

        let bestScore = 0;
        let score = 0;
        let level = 1;
        let popsInLevel = 0;
        let energy = 0;
        let active = false;
        let paused = false;
        let bubbles = [];
        let stuckBubbles = [];
        let particles = [];
        let lastSpawn = 0;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type, val = 0) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'pop') { osc.type = 'sine'; osc.frequency.setValueAtTime(650, audioCtx.currentTime); }
            else if (type === 'hit') { osc.type = 'sine'; osc.frequency.setValueAtTime(400 + val * 40, audioCtx.currentTime); }
            else if (type === 'lightning') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(60, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.4); }
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Bubble {
            constructor() {
                this.count = Math.floor(Math.random() * 5) + 1;
                this.radius = 25 + (this.count * 10);
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.color = ['#38bdf8', '#818cf8', '#a78bfa', '#f472b6', '#fb7185'][this.count - 1];
                this.vy = (0.7 + Math.random() * 2.3) + (level * 0.45);
                this.vx = (Math.random() - 0.5) * 0.6;
                this.scale = 1; this.isStuck = false;
            }
            update() {
                if (this.scale > 1) this.scale -= 0.12;
                if (!this.isStuck) {
                    this.y += this.vy; this.x += this.vx;
                    if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) this.vx *= -1;
                    if (this.y + this.radius >= canvas.height) { this.y = canvas.height - this.radius; this.isStuck = true; stuckBubbles.push(this); return true; }
                    for (let sb of stuckBubbles) {
                        const d = Math.hypot(this.x - sb.x, this.y - sb.y);
                        if (d < this.radius + sb.radius - 3.5) {
                            this.isStuck = true; const angle = Math.atan2(this.y - sb.y, this.x - sb.x);
                            this.x = sb.x + Math.cos(angle) * (this.radius + sb.radius);
                            this.y = sb.y + Math.sin(angle) * (this.radius + sb.radius);
                            stuckBubbles.push(this); return true;
                        }
                    }
                }
                return false;
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.scale, this.scale);
                ctx.beginPath(); const grad = ctx.createRadialGradient(-this.radius/3, -this.radius/3, 0, 0, 0, this.radius);
                grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, this.color); grad.addColorStop(1, 'rgba(0,0,0,0.5)');
                ctx.fillStyle = grad; ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2.5; ctx.stroke();
                ctx.fillStyle = 'white'; ctx.font = `bold ${this.radius * 0.9}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.count, 0, 1); ctx.restore();
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bg.addColorStop(0, '#020617'); bg.addColorStop(1, '#0f172a');
            ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (active && !paused) {
                const now = Date.now();
                const spawnRate = Math.max(250, 1500 - (level * 100));
                if (now - lastSpawn > spawnRate) { bubbles.push(new Bubble()); lastSpawn = now; }
                for (let b of stuckBubbles) if (b.y - b.radius < canvas.height / 2) { gameOver(); break; }
            }

            if (!paused) {
                bubbles = bubbles.filter(b => !b.update());
                // 物理坍塌邏輯
                stuckBubbles.forEach(b => {
                    if (b.y + b.radius < canvas.height) {
                        let support = false;
                        for (let other of stuckBubbles) {
                            if (b === other) continue;
                            const d = Math.hypot(b.x - other.x, (b.y + 4) - other.y);
                            if (d < b.radius + other.radius && other.y > b.y) { support = true; break; }
                        }
                        if (!support) b.y += 5;
                    } else if (b.y + b.radius > canvas.height) b.y = canvas.height - b.radius;
                });
            }

            [...bubbles, ...stuckBubbles].forEach(b => b.draw());
            
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.05;
                ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                return p.alpha > 0;
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(loop);
        }

        function handleInput(e) {
            if (!active || paused) return;
            const rect = canvas.getBoundingClientRect();
            const px = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const py = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            let hits = [];
            bubbles.forEach((b, i) => { if (Math.hypot(px-b.x, py-b.y) <= b.radius) hits.push({b, i, d: Math.hypot(px-b.x, py-b.y), stuck: false}); });
            stuckBubbles.forEach((b, i) => { if (Math.hypot(px-b.x, py-b.y) <= b.radius) hits.push({b, i, d: Math.hypot(px-b.x, py-b.y), stuck: true}); });
            
            if (hits.length === 0) return;
            hits.sort((a,b) => a.d - b.d);
            const target = hits[0]; const b = target.b;
            
            b.count--; b.scale = 1.45;
            if (b.count <= 0) {
                if (target.stuck) stuckBubbles.splice(stuckBubbles.indexOf(b), 1); 
                else bubbles.splice(bubbles.indexOf(b), 1);
                for(let i=0; i<8; i++) particles.push({x: b.x, y: b.y, color: b.color, size: Math.random()*5+2, alpha: 1, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12});
                
                energy++; popsInLevel++; score += 100;
                updateHud();
                if (popsInLevel >= 100) levelUpTrigger();
                if (energy >= 8) setTimeout(lightningBurst, 50);
                sfx('pop');
            } else { 
                score += 10; updateHud(); sfx('hit', b.count); 
            }
        }

        function updateHud() {
            document.getElementById('hud-pops').innerText = popsInLevel;
            document.getElementById('hud-score').innerText = String(score).padStart(6, '0');
            document.getElementById('hud-level').innerText = level;
            const dots = document.getElementById('energy-slots').children;
            for(let i=0; i<8; i++) {
                dots[i].className = `w-2.5 h-2.5 rounded-full transition-all duration-300 ${i < energy ? 'bg-sky-400 shadow-[0_0_10px_#38bdf8] scale-110' : 'bg-slate-800 scale-100'}`;
            }
        }

        function lightningBurst() {
            energy = 0; updateHud();
            const fx = document.getElementById('lightning-overlay');
            fx.classList.add('lightning-active'); setTimeout(() => fx.classList.remove('lightning-active'), 600);
            [...bubbles, ...stuckBubbles].forEach(b => {
                score += (b.isStuck ? 60 : 30) * b.count;
                for(let i=0; i<6; i++) particles.push({x: b.x, y: b.y, color: b.color, size: Math.random()*5+3, alpha: 1, vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18});
            });
            bubbles = []; stuckBubbles = [];
            updateHud(); sfx('lightning'); if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        function levelUpTrigger() {
            active = false; paused = true;
            level++; // 立即進位
            popsInLevel = 0; // 立即重置
            updateHud();
            
            showModal('pause-panel');
            document.getElementById('pause-title').innerText = "關卡晉升!";
            document.getElementById('pause-title').className = "text-4xl font-black text-sky-400 mb-6 italic";
            document.getElementById('pause-score').innerText = score;
            sfx('pop');
        }

        function gameOver() {
            active = false;
            showModal('game-over-panel');
            document.getElementById('final-score').innerText = score;
            document.getElementById('encouragement-text').innerText = `「${ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)]}」`;
        }

        function showModal(id) {
            document.getElementById('modal-container').classList.remove('hidden');
            ['start-panel', 'pause-panel', 'game-over-panel'].forEach(p => {
                document.getElementById(p).classList.toggle('hidden', p !== id);
            });
        }

        function updateBestScoreUI() {
            document.getElementById('best-score-display').innerText = String(bestScore).padStart(6, '0');
        }

        async function saveAndQuit() {
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bubble_best_score', bestScore);
                if (user && db) {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'stats', 'highscore'), { score: bestScore, timestamp: Date.now() });
                }
            }
            // 返回首頁狀態重置
            score = 0; level = 1; popsInLevel = 0; energy = 0;
            bubbles = []; stuckBubbles = []; updateHud();
            updateBestScoreUI();
            showModal('start-panel');
        }

        // --- 事件綁定 ---
        document.getElementById('btn-start').onclick = () => {
            active = true; paused = false; score = 0; level = 1; popsInLevel = 0; energy = 0;
            bubbles = []; stuckBubbles = []; lastSpawn = Date.now();
            updateHud();
            document.getElementById('modal-container').classList.add('hidden');
        };

        document.getElementById('btn-pause').onclick = () => {
            if (!active || paused) return;
            active = false; paused = true;
            showModal('pause-panel');
            document.getElementById('pause-title').innerText = "遊戲暫停";
            document.getElementById('pause-title').className = "text-4xl font-black text-white mb-6 italic";
            document.getElementById('pause-score').innerText = score;
        };

        document.getElementById('btn-resume').onclick = () => {
            active = true; paused = false;
            document.getElementById('modal-container').classList.add('hidden');
        };

        document.getElementById('btn-save-quit').onclick = saveAndQuit;
        document.getElementById('btn-final-save').onclick = saveAndQuit;
        
        document.getElementById('btn-retry').onclick = () => {
            document.getElementById('btn-start').onclick();
        };

        canvas.addEventListener('pointerdown', handleInput);
        
        // 啟動
        initFirebase();
        loop();
    </script>
</body>
</html>
